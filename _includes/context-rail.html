<aside class="context-rail" aria-label="Operational status">
  <div class="rail-head">STATUS</div>
  <div class="ctx-block">
    <div class="ctx-k">POSTURE</div>
    <div class="ctx-v">LARVAL CONTROL — PRIMARY</div>
  </div>
  <div class="ctx-block">
    <div class="ctx-k">FIRST MOVE</div>
    <div class="ctx-v">Re-dunk standing water</div>
  </div>
  <div class="ctx-block">
    <div class="ctx-k">INDEX</div>
    <ol class="ctx-index">
      {%- for s in site.data.nav.order_sections %}
      <li><a class="section-link" href="#{{ s.id }}"><span class="n">{{ s.num }}</span> {{ s.short }}</a></li>
      {%- endfor %}
    </ol>
  </div>
</aside>
