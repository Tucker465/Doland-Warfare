<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Content Security Policy. Single-origin: all scripts, styles, fonts, and
     images are same-origin (or self-contained data: URIs), so no external
     origins are allowed. A matching policy is also delivered as a real response
     header via a Cloudflare Transform Rule; keep the two in sync. Note: browsers
     ignore frame-ancestors in a <meta> CSP (it only takes effect as a real
     header), so clickjacking protection is enforced by the Cloudflare header —
     it is listed here too only so the meta and header policies stay identical.
     Adding ANY external resource (script/img/font/fetch/iframe) requires
     updating the matching directive here AND in the Cloudflare rule. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; object-src 'none'">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
<!-- Open Graph / social + agent link preview metadata (public summary only). -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta name="twitter:card" content="summary">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "@id": "{{ '/' | absolute_url }}#website",
      "url": "{{ '/' | absolute_url }}",
      "name": {{ site.title | jsonify }},
      "description": {{ site.description | jsonify }},
      "inLanguage": "en"
    },
    {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}#webpage",
      "url": "{{ page.url | absolute_url }}",
      "name": {{ page.title | default: site.title | jsonify }},
      "description": {{ page.description | default: site.description | jsonify }},
      "isPartOf": { "@id": "{{ '/' | absolute_url }}#website" },
      "inLanguage": "en"
    }
  ]
}
</script>
<link rel="stylesheet" href="/fonts/fonts.css">
<link rel="stylesheet" href="/styles.css">
