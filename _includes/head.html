<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Content Security Policy. Single-origin: all scripts, styles, fonts, and
     images are served from this origin, so no external origins are allowed. A
     matching policy is also delivered as a real response header via a Cloudflare
     Transform Rule; keep the two in sync. frame-ancestors is intentionally NOT
     in this meta tag: browsers ignore it in a <meta> CSP (and log a console
     warning), so clickjacking protection is enforced only by the Cloudflare
     header, which keeps frame-ancestors 'self'. Adding ANY external resource
     (script/img/font/fetch/iframe) requires updating the matching directive
     here AND in the Cloudflare rule. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="manifest" href="/manifest.json">
<!-- Open Graph / social + agent link preview metadata (public summary only). -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta name="twitter:card" content="summary">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "@id": "{{ '/' | absolute_url }}#website",
      "url": "{{ '/' | absolute_url }}",
      "name": {{ site.title | jsonify }},
      "description": {{ site.description | jsonify }},
      "inLanguage": "en"
    },
    {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}#webpage",
      "url": "{{ page.url | absolute_url }}",
      "name": {{ page.title | default: site.title | jsonify }},
      "description": {{ page.description | default: site.description | jsonify }},
      "isPartOf": { "@id": "{{ '/' | absolute_url }}#website" },
      "inLanguage": "en"
    },
    {
      "@type": "Organization",
      "@id": "{{ '/' | absolute_url }}#organization",
      "name": {{ site.title | jsonify }},
      "url": "{{ '/' | absolute_url }}",
      "description": "A free, volunteer, neighbor-to-neighbor mosquito control effort. Not affiliated with any government agency.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": {{ site.data.locale.town | jsonify }},
        "addressRegion": {{ site.data.locale.state | jsonify }},
        "postalCode": {{ site.data.locale.postal_code | jsonify }},
        "addressCountry": "US"
      }
    }
    {%- if page.schema_article %}
    ,{
      "@type": "Article",
      "@id": "{{ page.url | absolute_url }}#article",
      "headline": {{ page.title | default: site.title | jsonify }},
      "description": {{ page.description | default: site.description | jsonify }},
      "mainEntityOfPage": { "@id": "{{ page.url | absolute_url }}#webpage" },
      "author": { "@id": "{{ '/' | absolute_url }}#organization" },
      "publisher": { "@id": "{{ '/' | absolute_url }}#organization" },
      "inLanguage": "en"
      {%- if page.preload_hero %},
      "image": "{{ '/assets/hero-1280.webp' | absolute_url }}"
      {%- endif %}
    }
    {%- endif %}
    {%- if page.schema_howto %}
    ,{
      "@type": "HowTo",
      "@id": "{{ page.url | absolute_url }}#howto",
      "name": "How to Stop Mosquitoes From Breeding on Your Property",
      "description": "The four moves to knock down mosquito breeding sites on residential property, using standing-water removal and Bti larval control.",
      "step": [
        {%- for s in site.data.quickstart %}
        { "@type": "HowToStep", "position": {{ forloop.index }}, "name": {{ s.lead | jsonify }}, "text": {{ s.text | jsonify }} }{% unless forloop.last %},{% endunless %}
        {%- endfor %}
      ]
    }
    {%- endif %}
    {%- if page.schema_faq %}
    ,{
      "@type": "FAQPage",
      "@id": "{{ page.url | absolute_url }}#faq",
      "mainEntity": [
        {%- for item in site.data.faq %}
        { "@type": "Question", "name": {{ item.q | jsonify }}, "acceptedAnswer": { "@type": "Answer", "text": {{ item.a | jsonify }} } }{% unless forloop.last %},{% endunless %}
        {%- endfor %}
      ]
    }
    {%- endif %}
  ]
}
</script>
{%- if page.preload_hero %}
<!-- Preload the LCP hero image so it starts fetching before the CSS. -->
<link rel="preload" as="image" type="image/webp" href="/assets/hero-1280.webp" imagesrcset="/assets/hero-800.webp 800w, /assets/hero-1280.webp 1280w" imagesizes="(min-width:1201px) 1080px, 100vw" fetchpriority="high">
{%- endif %}
<!-- Deliberately blocking, not deferred: measured deferring styles.css via
     media="print" swap (avoiding fonts.css/styles.css render-blocking) against
     this dark theme and it was a net loss — the browser paints unstyled
     (default white bg, black text, blue links) for ~100-150ms before the swap,
     then reflows into the real layout. That reflow tanked CLS from ~0.06 to
     0.77 and dropped the Lighthouse Performance score from 89 to 60, despite
     FCP improving. A real fix would need true critical-CSS extraction (a hand
     -maintained inline subset kept in sync with styles.css forever) rather
     than deferring the whole file; not worth that maintenance burden for the
     scores already achieved. Both files are small (~28KB + ~4KB) and
     font-display:swap already keeps fonts from blocking text paint. -->
<link rel="stylesheet" href="/fonts/fonts.css">
<link rel="stylesheet" href="/styles.css">
