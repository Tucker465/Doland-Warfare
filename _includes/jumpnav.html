{%- assign current_sections = site.data.nav.page_sections[page.nav_key] %}
<!-- Fixed to the bottom-right corner rather than the top bar: thumb-reach
     research (the basis for standard floating-action-button placement in
     nearly every major mobile app) shows the top of a tall phone screen is
     the hardest zone to reach one-handed, while bottom corners are the
     easiest. Panel opens upward since the trigger sits at the bottom edge.
     Hidden at/above the desktop rail breakpoint, same as before. Native
     <details> needs no JS to open/close. -->
<details class="jumpnav" id="jumpnav">
  <summary><span class="chev" aria-hidden="true">▾</span> JUMP TO</summary>
  <nav class="jumpnav-list" aria-label="Site navigation">
    {%- if current_sections %}
    <a class="section-link" href="#top">Top</a>
    {%- for s in current_sections %}
    <a class="section-link" href="#{{ s.id }}"><span class="n">{{ s.num }}</span> {{ s.label }}</a>
    {%- endfor %}
    <div class="jumpnav-divider"></div>
    {%- endif %}
    {%- for p in site.data.nav.primary %}
    <a class="section-link{% if page.nav_key == p.key %} active{% endif %}" href="{{ p.url }}">{{ p.label }} <span class="sub">— {{ p.sub }}</span></a>
    {%- endfor %}
    <a class="section-link{% if page.url == '/about/' %} active{% endif %}" href="/about/">About</a>
  </nav>
</details>
