# Single source of truth for navigation.
#
# primary: top-level site sections. Phase 1 ships one page (The Order); as Build
# Plans / Tools / Field Manual / Resupply land, add an entry here and it appears
# in the chrome automatically — no template edits.
primary:
  - { label: "The Order", url: "/", key: order }
  # - { label: "Build Plans",  url: "/build/",  key: build }
  # - { label: "Tools",        url: "/tools/",  key: tools }
  # - { label: "Field Manual", url: "/intel/",  key: intel }
  # - { label: "Resupply",     url: "/resupply/", key: resupply }

# In-page sections of The Order (home doctrine page). Drives the top-bar phase
# nav, the desktop section rail, and the context-rail index from one list.
order_sections:
  - { num: "01", id: situation,   short: SIT,   label: Situation }
  - { num: "02", id: mission,     short: MSN,   label: Mission }
  - { num: "03", id: execution,   short: EXEC,  label: Execution }
  - { num: "04", id: sustainment, short: SUST,  label: Sustainment }
  - { num: "05", id: signal,      short: "C&S", label: "Command & Signal" }
  - { num: "06", id: faq,         short: FAQ,   label: "Frequently Asked Questions" }
